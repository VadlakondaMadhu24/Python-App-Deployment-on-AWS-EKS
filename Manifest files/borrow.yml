---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: borrow-deployment 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: borrow
  template:
    metadata:
      labels:
        app: borrow
    spec:
      containers:
      - name: borrow-cont
        image: vadlakondadocker24/mcaregistry:borrowimage
        ports:
        - containerPort: 5003

---
apiVersion: v1
kind: Service
metadata:
  name: borrow-service
spec:
  selector:
    app: borrow
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5000
  type: ClusterIP
