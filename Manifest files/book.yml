---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-deployment 
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: book
  template:
    metadata:
      labels:
        app: book 
    spec:
      containers: 
      - name: book-cont
        image: vadlakondadocker24/mcaregistry:bookimage
        ports:
        - containerPort: 5002

---
apiVersion: v1
kind: Service
metadata:
  name: book-service
spec:
  selector:
    app: book
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5000
  type: ClusterIP
